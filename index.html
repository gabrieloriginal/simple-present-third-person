<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Balloons - Modespice Extra++</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        .animate-float-up {
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }
        .balloon-idle {
            animation: gentleFloat 3s ease-in-out infinite;
        }
        @keyframes popParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: popParticle 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 25;
        }
        @keyframes comboPulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #fbbf24; }
            50% { transform: scale(1.3); text-shadow: 0 0 30px #f59e0b; }
            100% { transform: scale(1); text-shadow: 0 0 10px #fbbf24; }
        }
        .combo-text {
            animation: comboPulse 0.4s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes eq {
            0% { height: 4px; }
            100% { height: 20px; }
        }
        .eq-bar {
            width: 5px;
            background-color: #34d399;
            border-radius: 3px;
            animation: eq 0.5s ease-in-out infinite alternate;
        }
        .eq-bar:nth-child(1) { animation-duration: 0.4s; }
        .eq-bar:nth-child(2) { animation-duration: 0.7s; animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { animation-duration: 0.5s; animation-delay: 0.2s; }
        .eq-bar:nth-child(4) { animation-duration: 0.6s; animation-delay: 0.3s; }
        .music-paused .eq-bar {
            animation: none !important;
            height: 4px !important;
            background-color: #94a3b8;
        }
        .hidden-state {
            display: none !important;
        }
        @keyframes chaosSpin {
            100% { filter: hue-rotate(360deg); }
        }
        .zone-7-chaos {
            animation: chaosSpin 0.5s linear infinite;
        }
    </style>
</head>

        const ZONES_DEF = [
            { name: "Simplicity", bg: "from-sky-500 to-indigo-600", modes: ["The First Mode", "Instant Win Mode", "Deep Instant Win Mode", "Rock Bottom Instant Win Mode", "Unfailable Mode", "The Lower Gap Mode", "Automatic Mode", "Effortless Mode", "Easy Mode"] },
            { name: "Normality", bg: "from-amber-500 to-orange-700", modes: ["Normal Mode", "False 1", "TRUE 1", "Medium Mode", "Intermediate Mode", "Hard Mode", "Encore Mode", "True Hard Mode", "Extreme Mode", "Insane Mode", "Darkness Mode", "Broken Mode", "Nightmare Mode", "Unforgiving Mode", "Max Mode", "Sleep Mode", "Sickened Sleep", "Halcyon Mode", "Fire Mode", "True Extreme Mode"] },
            { name: "Insanity", bg: "from-violet-900 to-fuchsia-900", modes: ["TurkishSmosh Mode", "Super Idol Mode", "Greek Mode", "God Mode", "Archean Mode", "Divine Mode", "Goku Mode", "Quantum Mode", "Miserable Mode", "Dramatic Mode", "Vis Mode", "Unimaginable Mode", "True Nightmare Mode", "Eternal Nightmare Mode", "Eternal Torture Mode"] },
            { name: "Impossibility", bg: "from-cyan-700 to-blue-900", modes: ["Evil Mode", "Doomed Mode", "Impossible Mode", "True Turkish Smosh Mode", "Dreadful Mode", "Immeasurable Mode", "Capitalism mode", "Real Mode", "Yen Mode", "Euro Mode", "Greed Mode", "Paypal Mode", "Lunatic Mode", "The Mode", "Emotionless Mode", "Pointless Mode", "END Mode"] },
            { name: "Ascension", bg: "from-rose-800 to-red-600", modes: ["Error Mode", "BSOD Mode", "Super Hard Mode", "Super Extreme Mode", "Super Nightmare Mode", "Final Destination Mode", "Illuminati Mode", "True God Mode", "Chaos Mode"] },
            { name: "Turmoil", bg: "from-black to-red-900", modes: ["Anomalous Mode", "RUN Mode", "HELL Mode", "Aero Mode", "Daymare Mode", "Don't Jump Mode", "Scorching Mode", "Wistfully Mode", "True Miserable Mode", "Supreme Mode"] },
            { name: "Ragebait", bg: "from-black to-white", modes: ["Major League Mode", "True Eternal Torture Mode", "Megadeath Mode", "Dilly Impossible Mode", "why Mode", "True Impossible Mode", "The Final Mode", "True End Mode"] }
        ];

        let ALL_MODES = [];
        ZONES_DEF.forEach((z, zi) => {
            z.modes.forEach((m, mi) => {
                let globIndex = ALL_MODES.length;
                let t = Math.max(1.5, 35 - Math.floor(globIndex * 0.4));
                let s = 0.15 + (globIndex * 0.06);
                ALL_MODES.push({
                    index: globIndex,
                    zoneId: zi + 1,
                    zoneName: z.name,
                    bgClass: z.bg,
                    name: m,
                    time: t,
                    speed: s,
                    reqScore: 50 + (globIndex * 15)
                });
            });
        });

        const AudioSys = {
            ctx: null,
            bgmEl: null,
            init: function() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                if (!this.bgmEl) {
                    this.bgmEl = document.getElementById('bg-music');
                    this.bgmEl.volume = 0.5;
                }
            },
            playTone: function(freq, type, duration, vol=0.1) {
                if(!this.ctx || !sfxOn) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            },
            playPop: function() { this.playTone(800, 'sine', 0.15, 0.2); },
            playError: function() { this.playTone(150, 'sawtooth', 0.4, 0.2); },
            playCombo: function(comboCount) {
                const freq = 400 + (comboCount * 100);
                this.playTone(Math.min(freq, 1200), 'triangle', 0.2, 0.15);
            },
            playLevelUp: function() {
                this.playTone(400, 'sine', 0.1, 0.15);
                setTimeout(() => this.playTone(500, 'sine', 0.1, 0.15), 100);
                setTimeout(() => this.playTone(600, 'sine', 0.1, 0.15), 200);
                setTimeout(() => this.playTone(800, 'sine', 0.4, 0.2), 300);
            },
            startBGM: function() {
                if(!this.bgmEl || !bgmOn) return;
                if (this.bgmEl.paused) this.bgmEl.play().catch(()=>{});
            },
            stopBGM: function() {
                if(this.bgmEl && !this.bgmEl.paused) this.bgmEl.pause();
            }
        };

        let gameState = 'login';
        let currentUser = "";
        let usersData = JSON.parse(localStorage.getItem('modespice_users')) || {};
        let currentModeIndex = 0;
        let score = 0;
        let modePoints = 0;
        let lives = 3;
        let timeLeft = 30;
        let currentSubject = "Ready...";
        let balloons = []; 
        let balloonElements = {}; 
        let combo = 0; 
        let bgmOn = true;
        let sfxOn = true;
        let previousState = 'login';
        let gameLoopInterval = null;
        let timerInterval = null;
        let transitionTimeout = null;

        function saveUserData() {
            if(!currentUser) return;
            if(!usersData[currentUser]) usersData[currentUser] = { maxMode: 0, points: 0 };
            if(currentModeIndex > usersData[currentUser].maxMode) usersData[currentUser].maxMode = currentModeIndex;
            if(score > usersData[currentUser].points) usersData[currentUser].points = score;
            localStorage.setItem('modespice_users', JSON.stringify(usersData));
        }

        function exportSave() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(usersData));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "modespice_save.json");
            dl.click();
        }

        function login() {
            const val = document.getElementById('username-input').value.trim();
            if(!val) return;
            currentUser = val;
            if(!usersData[currentUser]) usersData[currentUser] = { maxMode: 0, points: 0 };
            currentModeIndex = usersData[currentUser].maxMode;
            AudioSys.init();
            setGameState('menu');
        }

        function logout() {
            currentUser = "";
            setGameState('login');
        }

        function updateUI() {
            const inGame = gameState === 'playing' || gameState === 'paused' || gameState === 'transition' || gameState === 'countdown' || gameState === 'countdown_resume';
            
            document.getElementById('login-overlay').classList.toggle('hidden-state', gameState !== 'login');
            document.getElementById('hud').classList.toggle('hidden-state', !inGame);
            document.getElementById('game-canvas').classList.toggle('hidden-state', !inGame);
            document.getElementById('menu-overlay').classList.toggle('hidden-state', gameState !== 'menu');
            document.getElementById('paused-overlay').classList.toggle('hidden-state', gameState !== 'paused');
            document.getElementById('settings-overlay').classList.toggle('hidden-state', gameState !== 'settings');
            document.getElementById('transition-overlay').classList.toggle('hidden-state', gameState !== 'transition');
            document.getElementById('gameover-overlay').classList.toggle('hidden-state', gameState !== 'gameover');
            document.getElementById('leaderboard-overlay').classList.toggle('hidden-state', gameState !== 'leaderboard');
            document.getElementById('countdown-overlay').classList.toggle('hidden-state', (gameState !== 'countdown' && gameState !== 'countdown_resume'));

            if(gameState === 'menu') {
                document.getElementById('menu-welcome').innerText = `Hacker: ${currentUser} | Max Mode: ${usersData[currentUser].maxMode}`;
                document.getElementById('btn-play-career').innerText = `PLAY MODE ${currentModeIndex}`;
            }

            if (inGame) {
                const modeObj = ALL_MODES[currentModeIndex];
                const gw = document.getElementById('game-wrapper');
                gw.className = `relative w-full h-screen max-h-screen transition-colors duration-1000 bg-gradient-to-b ${modeObj.bgClass}`;
                if(modeObj.zoneId >= 7) gw.classList.add('zone-7-chaos');
                else gw.classList.remove('zone-7-chaos');

                document.getElementById('hud-mode-name').innerText = modeObj.name;
                document.getElementById('hud-zone').innerText = `Zone ${modeObj.zoneId}: ${modeObj.zoneName}`;
                document.getElementById('hud-score').innerText = score;
                document.getElementById('hud-mode-points').innerText = modePoints;
                document.getElementById('hud-req-score').innerText = modeObj.reqScore;
                document.getElementById('current-subject').innerText = currentSubject;
                
                const comboEl = document.getElementById('hud-combo');
                if (combo > 1) {
                    comboEl.innerText = `Combo x${combo}!`;
                    comboEl.classList.add('combo-text');
                    setTimeout(() => comboEl.classList.remove('combo-text'), 400);
                } else {
                    comboEl.innerText = "";
                }

                const tShow = Math.max(0, Math.ceil(timeLeft));
                const timeStr = tShow.toString().padStart(2, '0');
                const timeEl = document.getElementById('hud-time');
                timeEl.innerText = `00:${timeStr}`;
                if (tShow <= 2 && tShow > 0) timeEl.className = 'text-4xl font-black text-rose-400 animate-pulse tracking-tight drop-shadow-lg';
                else timeEl.className = 'text-4xl font-black text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] tracking-tight';

                const livesContainer = document.getElementById('hud-lives');
                livesContainer.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    const heart = document.createElement('div');
                    heart.innerHTML = ICONS.heart;
                    heart.className = i < lives ? 'text-rose-500 animate-pulse drop-shadow-md' : 'text-white/20';
                    livesContainer.appendChild(heart);
                }

                const playPauseBtn = document.getElementById('btn-pause-play');
                playPauseBtn.innerHTML = gameState === 'playing' ? ICONS.pause : ICONS.play;
                
                if (gameState === 'countdown' || gameState === 'countdown_resume') {
                    playPauseBtn.onclick = null;
                    playPauseBtn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    playPauseBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    playPauseBtn.onclick = () => setGameState(gameState === 'playing' ? 'paused' : 'playing');
                }
                
                const hudEq = document.getElementById('hud-eq');
                if (bgmOn && ['playing', 'countdown', 'countdown_resume', 'transition'].includes(gameState)) hudEq.classList.remove('music-paused');
                else hudEq.classList.add('music-paused');
            }

            document.getElementById('icon-music').innerHTML = bgmOn ? ICONS.volume2 : ICONS.volumeX;
            document.getElementById('icon-sfx').innerHTML = sfxOn ? ICONS.volume2.replace('emerald-400', 'fuchsia-400') : ICONS.volumeX;
            document.getElementById('toggle-music').className = `w-16 h-8 rounded-full relative transition-colors shadow-inner border border-black/20 ${bgmOn ? 'bg-emerald-500' : 'bg-slate-600'}`;
            document.getElementById('toggle-music-knob').className = `w-6 h-6 bg-white rounded-full absolute top-1 transition-transform shadow-md ${bgmOn ? 'translate-x-9' : 'translate-x-1'}`;
            document.getElementById('toggle-sfx').className = `w-16 h-8 rounded-full relative transition-colors shadow-inner border border-black/20 ${sfxOn ? 'bg-emerald-500' : 'bg-slate-600'}`;
            document.getElementById('toggle-sfx-knob').className = `w-6 h-6 bg-white rounded-full absolute top-1 transition-transform shadow-md ${sfxOn ? 'translate-x-9' : 'translate-x-1'}`;

            if (gameState === 'gameover') {
                document.getElementById('go-score').innerText = score;
                document.getElementById('go-mode').innerText = `Died at ${ALL_MODES[currentModeIndex].name}`;
            }
            if (gameState === 'transition') {
                document.getElementById('trans-score').innerText = score;
                let nxt = ALL_MODES[currentModeIndex + 1];
                if(nxt) document.getElementById('trans-next-theme').innerText = `NEXT: ${nxt.name}`;
                else document.getElementById('trans-next-theme').innerText = "YOU BEAT THE GAME. GO TOUCH GRASS.";
            }

            manageAudio();
        }

        function manageAudio() {
            if (['playing', 'countdown', 'countdown_resume', 'transition'].includes(gameState) && bgmOn) AudioSys.startBGM();
            else AudioSys.stopBGM();
        }

        function openLeaderboard() {
            const arr = Object.keys(usersData).map(k => ({ name: k, maxMode: usersData[k].maxMode, points: usersData[k].points }));
            arr.sort((a,b) => b.maxMode !== a.maxMode ? b.maxMode - a.maxMode : b.points - a.points);
            
            const cont = document.getElementById('leaderboard-content');
            cont.innerHTML = '';
            arr.forEach((u, i) => {
                const row = document.createElement('div');
                row.className = `flex bg-white/5 p-3 rounded-lg border border-white/5 text-white font-semibold ${u.name===currentUser?'ring-2 ring-yellow-400':''}`;
                row.innerHTML = `
                    <div class="w-16 text-center text-yellow-500 font-black">#${i+1}</div>
                    <div class="flex-1 pl-4 truncate">${u.name}</div>
                    <div class="flex-1 text-center text-emerald-400">${u.maxMode}</div>
                    <div class="w-32 text-right pr-4 text-rose-300">${u.points}</div>
                `;
                cont.appendChild(row);
            });
            setGameState('leaderboard');
        }

        function startCountdown(isResume = false) {
            AudioSys.init();
            setGameState(isResume ? 'countdown_resume' : 'countdown');
            let count = 3;
            const textEl = document.getElementById('countdown-text');
            const animateText = (text, isGo = false) => {
                textEl.innerText = text;
                textEl.classList.remove('animate-pop-in');
                void textEl.offsetWidth; 
                if(isGo) {
                    textEl.className = "text-9xl md:text-[12rem] font-black text-emerald-400 drop-shadow-[0_0_40px_rgba(52,211,153,0.9)] animate-pop-in tracking-widest";
                    if(sfxOn) AudioSys.playTone(800, 'sine', 0.4, 0.2); 
                } else {
                    textEl.className = "text-9xl md:text-[12rem] font-black text-yellow-400 drop-shadow-[0_0_30px_rgba(250,204,21,0.8)] animate-pop-in";
                    if(sfxOn) AudioSys.playTone(400, 'sine', 0.1, 0.15); 
                }
            };

            const tick = () => {
                if (gameState !== 'countdown' && gameState !== 'countdown_resume') return; 
                if (count > 0) {
                    animateText(count.toString());
                    count--;
                    setTimeout(tick, 1000);
                } else if (count === 0) {
                    animateText('GO!', true);
                    count--;
                    setTimeout(tick, 1000);
                } else {
                    if (gameState === 'countdown_resume') setGameState('playing');
                    else beginGameRound();
                }
            };
            tick();
        }

        function setGameState(newState) {
            if(gameState === 'playing' && newState !== 'playing') stopLoops();
            if (gameState === 'paused' && newState === 'countdown_resume') {
                gameState = newState;
                updateUI();
                startCountdown(true);
                return;
            }
            gameState = newState;
            if (gameState === 'playing') startLoops();
            updateUI();
        }

        function startGame() {
            enterFullScreen();
            score = 0;
            modePoints = 0;
            lives = 3;
            combo = 0;
            timeLeft = ALL_MODES[currentModeIndex].time;
            currentSubject = "Ready...";
            document.getElementById('particles-container').innerHTML = '';
            document.getElementById('floating-texts-container').innerHTML = '';
            document.getElementById('balloons-container').innerHTML = '';
            if (AudioSys.bgmEl) AudioSys.bgmEl.currentTime = 0;
            startCountdown(false);
        }

        function beginGameRound() {
            generateRound();
            setGameState('playing');
        }

        function generateRound() {
            let pLevel = Math.min(3, Math.ceil((currentModeIndex + 1) / 30));
            const dataPool = GRAMMAR_DATA[pLevel];
            const q = dataPool[Math.floor(Math.random() * dataPool.length)];
            
            const subjEl = document.getElementById('current-subject');
            subjEl.style.transform = 'scale(0.8)';
            subjEl.style.opacity = '0';
            setTimeout(() => {
                currentSubject = q.s;
                subjEl.innerText = currentSubject;
                subjEl.style.transform = 'scale(1)';
                subjEl.style.opacity = '1';
            }, 200);

            const isCorrectIndex = Math.floor(Math.random() * 3);
            const selectedIncorrect = [...q.i].sort(() => 0.5 - Math.random()).slice(0, 2);

            balloons = [];
            let incorrectCounter = 0;
            const shuffledColors = [...BALLOON_COLORS].sort(() => 0.5 - Math.random());
            const xPos = [15, 50, 85].sort(() => 0.5 - Math.random());
            const speedCalc = ALL_MODES[currentModeIndex].speed;

            for (let i = 0; i < 3; i++) {
                const isCorrect = i === isCorrectIndex;
                balloons.push({
                    id: Math.random().toString(36).substr(2, 9),
                    verb: isCorrect ? q.c : selectedIncorrect[incorrectCounter++],
                    isCorrect: isCorrect,
                    x: xPos[i],
                    y: -25 - Math.random() * 20, 
                    speed: speedCalc,
                    colorData: shuffledColors[i]
                });
            }
            renderBalloons();
            updateUI();
        }

        function renderBalloons() {
            const container = document.getElementById('balloons-container');
            container.innerHTML = '';
            balloonElements = {};
            balloons.forEach(b => {
                const el = document.createElement('div');
                el.className = 'absolute flex flex-col items-center w-28 md:w-32 balloon-idle';
                el.style.left = `calc(${b.x}% - 3.5rem)`;
                el.style.top = `${b.y}%`;
                let scaleVal = currentModeIndex > 50 ? 0.8 : 1;
                el.innerHTML = `
                    <div style="transform: scale(${scaleVal})" class="w-24 h-32 md:w-28 md:h-36 ${b.colorData.class} rounded-t-full rounded-b-[45%] flex items-center justify-center shadow-[inset_-6px_-6px_15px_rgba(0,0,0,0.2),_0_10px_15px_rgba(0,0,0,0.3)] cursor-pointer hover:scale-105 active:scale-95 transition-all relative overflow-hidden group border border-white/20">
                        <div class="absolute top-3 left-3 w-5 h-8 bg-white/30 rounded-full rotate-[30deg] pointer-events-none group-hover:bg-white/40 transition-colors"></div>
                        <span class="text-white font-extrabold text-2xl md:text-3xl drop-shadow-[0_2px_4px_rgba(0,0,0,0.6)] z-10 pointer-events-none px-2 text-center w-full break-words leading-tight tracking-wide ${currentModeIndex > 80 ? 'opacity-0 group-hover:opacity-100' : ''}">${b.verb}</span>
                    </div>
                    <div class="w-4 h-4 ${b.colorData.class} mt-[-6px] rotate-45 z-0 pointer-events-none shadow-md border-b border-r border-black/10"></div>
                    <div class="w-[2px] h-20 md:h-24 bg-white/40 -mt-1 pointer-events-none"></div>
                `;
                el.children[0].onmousedown = (e) => { e.preventDefault(); handleBalloonClick(b.id); };
                el.children[0].ontouchstart = (e) => { e.preventDefault(); handleBalloonClick(b.id); };
                container.appendChild(el);
                balloonElements[b.id] = el;
            });
        }

        function createParticles(x, y, hexColor) {
            const container = document.getElementById('particles-container');
            for(let i=0; i<12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.backgroundColor = hexColor;
                p.style.left = `calc(${x}% - 5px)`;
                p.style.top = `${y}%`;
                p.style.width = `${Math.random() * 8 + 6}px`;
                p.style.height = p.style.width;
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 60 + 40;
                p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                p.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                container.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        function handleBalloonClick(id) {
            if (gameState !== 'playing') return;
            const balloon = balloons.find(b => b.id === id);
            if (!balloon) return;
            if (balloon.isCorrect) {
                combo++;
                if (sfxOn) {
                    AudioSys.playPop();
                    setTimeout(() => AudioSys.playCombo(combo), 100);
                }
                const pointsEarned = 10 * combo;
                score += pointsEarned;
                modePoints += pointsEarned;
                createParticles(balloon.x, balloon.y + 10, balloon.colorData.hex);
                addFloatingText(balloon.x, balloon.y, `+${pointsEarned}`, 'text-emerald-300 drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] text-4xl md:text-5xl');
                
                balloons = [];
                renderBalloons(); 
                updateUI();
                
                if (modePoints >= ALL_MODES[currentModeIndex].reqScore) {
                    setTimeout(() => handleTransition(), 300);
                } else {
                    setTimeout(() => generateRound(), 200);
                }
            } else {
                combo = 0; 
                if (sfxOn) AudioSys.playError();
                lives -= 1;
                addFloatingText(balloon.x, balloon.y, 'INCORRECT!', 'text-rose-500 drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] text-2xl md:text-3xl tracking-widest');
                balloons = balloons.filter(b => b.id !== id);
                if (balloonElements[id]) {
                    const el = balloonElements[id];
                    el.style.transition = 'transform 0.5s ease-in, opacity 0.3s';
                    el.style.transform = 'translateY(500px) rotate(45deg)';
                    el.style.opacity = '0';
                    setTimeout(() => { if(el.parentNode) el.remove(); }, 500);
                    delete balloonElements[id];
                }
                updateUI();
                if (lives <= 0) setTimeout(() => triggerGameOver(), 500);
            }
        }

        function handleMissedCorrect() {
            combo = 0; 
            if (sfxOn) AudioSys.playError();
            lives -= 1;
            balloons = [];
            renderBalloons();
            updateUI();
            if (lives <= 0) triggerGameOver();
            else {
                const subjEl = document.getElementById('current-subject');
                subjEl.innerText = "It got away!";
                subjEl.className = "text-3xl md:text-4xl text-rose-400 font-black tracking-widest drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] relative z-10 transition-all uppercase";
                setTimeout(() => {
                    subjEl.className = "text-5xl md:text-6xl text-white font-black tracking-wide drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] relative z-10 transition-all";
                    generateRound();
                }, 1000);
            }
        }

        function triggerGameOver() {
            saveUserData();
            setGameState('gameover');
        }

        function addFloatingText(x, y, text, colorClass) {
            const container = document.getElementById('floating-texts-container');
            const el = document.createElement('div');
            el.className = `absolute font-black animate-float-up pointer-events-none z-40 text-center ${colorClass}`;
            el.style.left = `calc(${x}% - 75px)`;
            el.style.width = '150px';
            el.style.top = `${y}%`;
            el.innerText = text;
            container.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function startLoops() {
            if (!gameLoopInterval) gameLoopInterval = setInterval(gameLoop, 16);
            if (!timerInterval) timerInterval = setInterval(timerLoop, 100);
        }

        function stopLoops() {
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            if (timerInterval) clearInterval(timerInterval);
            gameLoopInterval = null;
            timerInterval = null;
        }

        function gameLoop() {
            let missedCorrect = false;
            balloons.forEach(b => {
                b.y += b.speed;
                if (b.y > 110) {
                    if (b.isCorrect) missedCorrect = true;
                } else {
                    if (balloonElements[b.id]) {
                        balloonElements[b.id].style.top = `${b.y}%`;
                        if(currentModeIndex > 70 && b.y > 50) balloonElements[b.id].style.opacity = '0';
                    }
                }
            });
            if (missedCorrect) {
                stopLoops();
                handleMissedCorrect();
                if (lives > 0) startLoops(); 
            }
        }

        function timerLoop() {
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                stopLoops();
                handleMissedCorrect();
                if (lives > 0) {
                    timeLeft = ALL_MODES[currentModeIndex].time;
                    startLoops();
                }
            } else {
                updateUI();
            }
        }

        function handleTransition() {
            setGameState('transition');
            if (sfxOn) AudioSys.playLevelUp();
            saveUserData();
            updateUI(); 
            if (transitionTimeout) clearTimeout(transitionTimeout);
            transitionTimeout = setTimeout(() => {
                currentModeIndex++;
                if(currentModeIndex >= ALL_MODES.length) {
                    setGameState('menu');
                    return;
                }
                modePoints = 0;
                timeLeft = ALL_MODES[currentModeIndex].time;
                generateRound();
                setGameState('playing');
            }, 3000);
        }

        function openSettings() {
            previousState = gameState;
            setGameState('settings');
        }

        function closeSettings() {
            setGameState(previousState === 'settings' ? 'menu' : previousState);
        }

        function toggleBgm() {
            AudioSys.init();
            bgmOn = !bgmOn;
            updateUI();
        }

        function toggleSfx() {
            AudioSys.init();
            sfxOn = !sfxOn;
            updateUI();
        }

        window.onload = () => updateUI();
    </script>
</body>
</html>
